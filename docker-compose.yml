services:
  backend:
    build: ./backend
    container_name: effective-mobile-backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: effective-mobile-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
